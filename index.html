        padding: 0 var(--space-2);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
      }
      .range-editor__op { color: var(--gray-500); font-size: var(--fs-xs); }
      .range-editor__arrow { color: var(--gray-400); }
      .range-editor__label {
        flex: 1;
        height: 30px;
        padding: 0 var(--space-2);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
      }

      /* Enum editor */
      .enum-editor__body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
        margin-bottom: var(--space-3);
      }
      .enum-editor__col {
        border: 1px solid var(--gray-200);
        border-radius: var(--r-md);
        padding: var(--space-2);
        display: flex;
        flex-direction: column;
        min-height: 240px;
        background: var(--gray-50);
      }
      .enum-editor__col-title {
        font-weight: 600;
        margin-bottom: var(--space-2);
        color: var(--gray-600);
        font-size: var(--fs-sm);
      }
      .enum-editor__search {
        width: 100%;
        height: 28px;
        padding: 0 var(--space-2);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        margin-bottom: var(--space-2);
        background: #fff;
      }
      .enum-editor__list {
        flex: 1;
        max-height: 200px;
        overflow-y: auto;
        background: #fff;
        border-radius: var(--r-sm);
        padding: var(--space-1);
      }
      .enum-editor__item {
        display: flex;
        gap: 6px;
        padding: 4px var(--space-2);
        cursor: pointer;
        border-radius: 3px;
      }
      .enum-editor__item:hover { background: var(--primary-bg); }
      .enum-editor__group {
        margin-bottom: var(--space-2);
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        padding: var(--space-2);
      }
      .enum-editor__group-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: var(--space-1);
      }
      .enum-editor__group-label { font-weight: 600; color: var(--gray-800); }
      .enum-editor__group-members {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-1);
      }
      .enum-editor__member-chip {
        background: var(--primary-bg);
        color: var(--primary);
        border: 1px solid var(--primary-border);
        border-radius: 3px;
        padding: 1px 6px;
        font-size: var(--fs-xs);
      }
      .enum-editor__add-group {
        display: flex;
        gap: var(--space-1);
        margin-top: var(--space-2);
      }
      .enum-editor__add-group input {
        flex: 1;
        height: 28px;
        padding: 0 var(--space-2);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        background: #fff;
      }
      .enum-editor__add-group button {
        height: 28px;
        padding: 0 var(--space-2);
        background: #fff;
        border: 1px dashed var(--gray-300);
        color: var(--primary);
        border-radius: var(--r-sm);
        cursor: pointer;
        white-space: nowrap;
      }
      .enum-editor__handling {
        margin: var(--space-3) 0;
        font-size: var(--fs-md);
        color: var(--gray-700);
      }
      .enum-editor__handling-label { color: var(--gray-600); margin-right: var(--space-3); }
      .enum-editor__handling label { margin-right: var(--space-3); cursor: pointer; }
      .enum-editor__loading,
      .enum-editor__empty,
      .range-editor__error,
      .enum-editor__error,
      .expr-editor__status--err {
        padding: var(--space-2) 0;
        color: var(--gray-500);
        font-size: var(--fs-sm);
      }
      .range-editor__error,
      .enum-editor__error,
      .expr-editor__status--err {
        color: #991b1b;
        background: var(--red-bg);
        border: 1px solid #fecaca;
        border-radius: var(--r-sm);
        padding: var(--space-2) var(--space-3);
      }

      /* Expression status */
      .expr-editor__status {
        margin: var(--space-2) 0 var(--space-3);
        font-size: var(--fs-sm);
      }
      .expr-editor__status--ok { color: var(--green); }
      .expr-editor__status--idle { color: var(--gray-400); }
      .expr-editor__mdx-preview { margin-top: var(--space-2); }
      .expr-editor__mdx-preview pre {
        background: var(--gray-50);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--r-sm);
        font-size: var(--fs-xs);
        font-family: var(--font-mono);
        overflow-x: auto;
        border: 1px solid var(--gray-200);
        color: var(--gray-700);
      }

      /* MemberSelector */
      .member-selector__header {
        display: flex;
        gap: var(--space-2);
        align-items: center;
      }
      .member-selector__search {
        flex: 1;
        height: 30px;
        padding: 0 var(--space-3);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        outline: none;
      }
      .member-selector__search:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-bg);
      }
      .member-selector__quick { display: flex; gap: var(--space-1); }
      .member-selector__quick button {
        height: 30px;
        padding: 0 var(--space-3);
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        cursor: pointer;
      }
      .member-selector__body {
        flex: 1;
        overflow-y: auto;
        padding: var(--space-2) 0;
        min-height: 200px;
      }
      .member-selector__list { list-style: none; margin: 0; padding: 0; }
      .member-selector__item label {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        padding: 4px var(--space-2);
        cursor: pointer;
        border-radius: 3px;
      }
      .member-selector__item label:hover { background: var(--primary-bg); }
      .member-selector__count { color: var(--gray-500); font-size: var(--fs-sm); }
      .member-selector__actions { display: flex; gap: var(--space-2); }

      /* QuickCalc menu (legacy — chip 上不再显示，但保留 fallback 样式) */
      .quickcalc-menu {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--r-md);
        box-shadow: var(--shadow-lg);
        padding: var(--space-1) 0;
        z-index: 1000;
        min-width: 160px;
      }
      .quickcalc-menu__title {
        padding: 4px var(--space-3);
        font-size: var(--fs-xs);
        color: var(--gray-500);
        font-weight: 600;
      }
      .quickcalc-menu__item {
        display: block;
        width: 100%;
        text-align: left;
        padding: 6px var(--space-3);
        border: none;
        background: none;
        cursor: pointer;
        font-size: var(--fs-md);
        color: var(--gray-800);
      }
      .quickcalc-menu__item:hover { background: var(--primary-bg); color: var(--primary); }
      .quickcalc-menu__item--clear { color: var(--red); border-top: 1px solid var(--gray-200); }

      /* ============================================================
       * 我的字段 区
       * ============================================================ */
      .my-fields {
        margin-top: var(--space-4);
        padding-top: var(--space-3);
        border-top: 1px solid var(--gray-200);
      }
      .my-fields__title {
        font-weight: 600;
        font-size: var(--fs-xs);
        color: var(--gray-500);
        margin-bottom: var(--space-2);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        /* picker 浮层用 absolute 定位 */
        position: relative;
      }
      .my-fields__add-buttons { display: flex; gap: var(--space-1); }
      .my-fields__add-btn {
        font-size: var(--fs-xs);
        height: 22px;
        padding: 0 var(--space-2);
        background: #fff;
        border: 1px dashed var(--gray-300);
        border-radius: var(--r-sm);
        color: var(--primary);
        cursor: pointer;
        transition: all var(--tr-fast);
      }
      .my-fields__add-btn:hover:not(:disabled) {
        border-style: solid;
        background: var(--primary-bg);
      }
      .my-fields__add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      /* ============================================================
       * DetailModal (P3+ 明细数据)
       * ============================================================ */
      .detail-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 160ms ease;
      }
      .detail-modal {
        background: #fff;
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-xl);
        width: min(90vw, 1200px);
        height: min(80vh, 700px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .detail-modal__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--gray-200);
      }
      .detail-modal__title {
        font-size: var(--fs-md);
        font-weight: 600;
        color: var(--gray-900);
      }
      .detail-modal__count {
        margin-left: 8px;
        color: var(--gray-500);
        font-weight: 400;
        font-size: var(--fs-sm);
      }
      .detail-modal__close {
        width: 24px;
        height: 24px;
        background: transparent;
        border: none;
        border-radius: var(--r-sm);
        font-size: 20px;
        line-height: 1;
        color: var(--gray-500);
        cursor: pointer;
        font-family: inherit;
      }
      .detail-modal__close:hover {
        background: var(--gray-100);
        color: var(--gray-800);
      }
      .detail-modal__chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        padding: 8px var(--space-4);
        background: var(--gray-50);
        border-bottom: 1px solid var(--gray-200);
        font-size: var(--fs-xs);
      }
      .detail-modal__chips-label {
        color: var(--gray-500);
        margin-right: 4px;
      }
      .detail-modal__chip {
        padding: 2px 8px;
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: 10px;
        color: var(--gray-700);
        white-space: nowrap;
      }
      .detail-modal__body {
        flex: 1;
        overflow: auto;
        position: relative;
      }
      .detail-modal__state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--gray-500);
        font-size: var(--fs-sm);
      }
      .detail-modal__state--error { color: var(--red, #ef4444); }
      .detail-modal__table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--fs-sm);
      }
      .detail-modal__table th,
      .detail-modal__table td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid var(--gray-100);
        white-space: nowrap;
      }
      .detail-modal__table thead th {
        position: sticky;
        top: 0;
        background: var(--gray-50);
        font-weight: 600;
        color: var(--gray-700);
        border-bottom: 2px solid var(--gray-200);
        z-index: 1;
      }
      .detail-modal__table tbody tr:hover { background: var(--primary-bg); }

      /* ============================================================
       * ChartRenderer (P3+ 图表展示模式)
       * ============================================================ */
      .chart-renderer {
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--r-md);
      }
      .chart-renderer__canvas { min-height: 200px; }
      .chart-renderer__overlay,
      .chart-renderer__empty,
      .chart-renderer__error {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.85);
        color: var(--gray-500);
        font-size: var(--fs-sm);
        z-index: 5;
        pointer-events: none;
      }
      .chart-renderer__error { color: var(--red, #ef4444); }

      /* P3 显示设置 modal */
      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 160ms ease;
      }
      .settings-modal {
        background: #fff;
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-xl);
        min-width: 380px;
        max-width: 460px;
        max-height: 70vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .settings-modal__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--gray-200);
      }
      .settings-modal__title {
        font-size: var(--fs-md);
        font-weight: 600;
        color: var(--gray-900);
      }
      .settings-modal__close {
        width: 24px;
        height: 24px;
        background: transparent;
        border: none;
        border-radius: var(--r-sm);
        font-size: 20px;
        line-height: 1;
        color: var(--gray-500);
        cursor: pointer;
        font-family: inherit;
      }
      .settings-modal__close:hover {
        background: var(--gray-100);
        color: var(--gray-800);
      }
      .settings-modal__body {
        padding: var(--space-3) var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }
      .settings-modal__row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: var(--fs-sm);
        color: var(--gray-800);
        cursor: pointer;
        padding: 4px 0;
      }
      .settings-modal__row input[type='checkbox'] {
        margin: 0;
        cursor: pointer;
      }
      /* adhoc 顶部快速筛选条已删除(2026-05-10)— 改成走列头右键菜单"按值过滤"等 */

      /* P5+ disabled 设置项(adhoc 下不生效)— 灰显 + cursor 反馈 */
      .settings-modal__row[data-disabled="true"] {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .settings-modal__row[data-disabled="true"] input,
      .settings-modal__mode-btn:disabled {
        cursor: not-allowed;
      }
      /* P3+ 设置项 — 带 input/select 的行(空值文本 / 行列头模式) */
      .settings-modal__row--input {
        cursor: default;
      }
      .settings-modal__row--input > span:first-child {
        flex: 0 0 auto;
        min-width: 80px;
        color: var(--gray-700);
      }
      .settings-modal__row--input select,
      .settings-modal__row--input input[type='text'] {
        flex: 1 1 auto;
        height: 28px;
        box-sizing: border-box;
        padding: 0 var(--space-2);
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        font-size: var(--fs-sm);
        font-family: inherit;
        background: #fff;
      }
      .settings-modal__row--input select:focus,
      .settings-modal__row--input input[type='text']:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--primary-bg);
      }
      .settings-modal__inline-input {
        max-width: 120px;
      }
      /* P3+ 设置面板:模式切换按钮组(表格 / 树状) */
      .settings-modal__btn-group {
        display: inline-flex;
        gap: 0;
        border: 1px solid var(--gray-200);
        border-radius: var(--r-sm);
        overflow: hidden;
        background: #fff;
      }
      .settings-modal__mode-btn {
        appearance: none;
        height: 28px;
        padding: 0 var(--space-3);
        border: none;
        background: transparent;
        font-size: var(--fs-sm);
        font-family: inherit;
        color: var(--gray-700);
        cursor: pointer;
        transition: background var(--tr-fast), color var(--tr-fast);
        border-right: 1px solid var(--gray-200);
      }
      .settings-modal__mode-btn:last-child {
        border-right: none;
      }
      .settings-modal__mode-btn:hover:not([disabled]) {
        background: var(--primary-bg);
        color: var(--primary);
      }
      .settings-modal__mode-btn[data-active='true'] {
        background: var(--primary);
        color: #fff;
        font-weight: 600;
      }
      .settings-modal__mode-btn[disabled],
      .settings-modal__mode-btn[data-disabled='true'] {
        background: var(--gray-50);
        color: var(--gray-400);
        cursor: not-allowed;
      }

      /* P3+ 字段树视图模式切换 tabs */
      .field-tree__mode-tabs {
        display: flex;
        gap: 0;
        margin-bottom: var(--space-2);
        border-bottom: 1px solid var(--gray-200);
      }
      .field-tree__mode-tab {
        flex: 1 1 auto;
        height: 28px;
        padding: 0 var(--space-2);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        font-size: var(--fs-sm);
        font-family: inherit;
        color: var(--gray-500);
        cursor: pointer;
        transition: color var(--tr-fast), border-color var(--tr-fast);
      }
      .field-tree__mode-tab:hover {
        color: var(--gray-800);
      }
      .field-tree__mode-tab[data-active='true'] {
        color: var(--primary);
        border-bottom-color: var(--primary);
        font-weight: 600;
      }

      /* base field picker:modal 形式 — 点 + 范围/+ 分组 弹窗选字段 */
      .base-field-picker-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 160ms ease;
      }
      .base-field-picker {
        background: #fff;
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-xl);
        width: 480px;
        height: 70vh;
        max-height: 640px;
        min-height: 480px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .base-field-picker__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--gray-200);
      }
      .base-field-picker__title {
        font-size: var(--fs-md);
        font-weight: 600;
        color: var(--gray-900);
      }
      .base-field-picker__close {
        width: 24px;
        height: 24px;
        background: transparent;
        border: none;
        border-radius: var(--r-sm);
        font-size: 20px;
        line-height: 1;
        color: var(--gray-500);
        cursor: pointer;
        font-family: inherit;
      }
      .base-field-picker__close:hover {
        background: var(--gray-100);
        color: var(--gray-800);
      }
      .base-field-picker__hint {
        padding: var(--space-2) var(--space-4);
        font-size: var(--fs-xs);
        color: var(--gray-500);
        background: var(--gray-50);
        border-bottom: 1px solid var(--gray-200);
      }
      /* 搜索框 — 紧凑、内嵌图标,focus 仅描边变色不带 glow(避免溢出 modal) */
      .base-field-picker__search-wrap {
        position: relative;
        margin: var(--space-2) var(--space-4) var(--space-2);
      }
      .base-field-picker__search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        pointer-events: none;
        transition: color var(--tr-fast);
      }
      .base-field-picker__search-wrap:focus-within .base-field-picker__search-icon {
        color: var(--primary);
      }
      .base-field-picker__search {
        width: 100%;
        height: 30px;
        box-sizing: border-box;
        padding: 0 28px 0 30px;
        border: 1px solid var(--gray-200);
        border-radius: var(--r-md);
        background: #fff;
        font-size: var(--fs-md);
        font-family: inherit;
        color: var(--gray-900);
        outline: none;
        transition: border-color var(--tr-fast);
      }
      .base-field-picker__search:hover {
        border-color: var(--gray-300);
      }
      .base-field-picker__search:focus {
        border-color: var(--primary);
      }
      .base-field-picker__search::placeholder {
        color: var(--gray-400);
      }
      /* 清除按钮 — 仅有内容时显示 */
      .base-field-picker__search-clear {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        appearance: none;
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        border-radius: 50%;
        color: var(--gray-400);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        transition: background var(--tr-fast), color var(--tr-fast);
      }
      .base-field-picker__search-clear:hover {
        background: var(--gray-200);
        color: var(--gray-700);
      }
      .base-field-picker__empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6) var(--space-4);
        text-align: center;
        color: var(--gray-400);
        font-size: var(--fs-sm);
      }
      .base-field-picker__list {
        flex: 1;
        overflow-y: auto;
        padding: var(--space-2);
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .base-field-picker__item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-3);
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--r-md);
        font-size: var(--fs-md);
        color: var(--gray-800);
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        transition: all var(--tr-fast);
      }
      .base-field-picker__item:hover {
        background: var(--primary-bg);
        border-color: var(--primary);
      }
      .base-field-picker__item-icon {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--primary-bg);
        color: var(--primary);
        border-radius: var(--r-sm);
        font-weight: 600;
        font-size: var(--fs-sm);
        flex-shrink: 0;
      }
      .base-field-picker__item-alias {
        font-weight: 500;
        flex: 1;
      }
      .base-field-picker__item-name {
        font-size: var(--fs-xs);
        color: var(--gray-400);
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      .my-fields__empty {
        font-size: var(--fs-sm);
        color: var(--gray-400);
        font-style: italic;
        padding: var(--space-1) 0;
      }
      .my-fields__item {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        padding: 4px var(--space-2);
        border-radius: var(--r-sm);
        margin: 2px 0;
        font-size: var(--fs-md);
        cursor: grab;
        transition: background var(--tr-fast), box-shadow var(--tr-fast);
      }
      .my-fields__item:active { cursor: grabbing; }
      .my-fields__item:hover {
        background: var(--gray-100);
        box-shadow: inset 0 0 0 1px var(--primary);
      }
      /* 内部按钮恢复指针光标(避免整行 grab 误导) */
      .my-fields__item-remove { cursor: pointer; }
      /* P5+ "在用" checkbox(跟 FieldTree 的 checkbox 同语义) */
      .my-fields__checkbox {
        margin: 0 4px 0 0;
        cursor: pointer;
        accent-color: var(--primary);
        flex: 0 0 auto;
      }
      .my-fields__checkbox:disabled { cursor: not-allowed; opacity: 0.5; }
      .my-fields__kind-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
      }
      .my-fields__kind-badge[data-kind="calc_measure"] {
        background: var(--primary-bg);
        color: var(--primary);
      }
      .my-fields__kind-badge[data-kind="enum_group"] {
        background: var(--orange-bg);
        color: var(--orange);
      }
      .my-fields__kind-badge[data-kind="range_group"] {
        background: var(--purple-bg);
        color: var(--purple);
      }
      .my-fields__item-name { flex: 1; color: var(--gray-800); }
      .my-fields__item-remove {
        border: none;
        background: none;
        cursor: pointer;
        color: var(--gray-400);
        font-size: var(--fs-md);
      }
      .my-fields__item-remove:hover { color: var(--red); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/demo/main.tsx"></script>
  </body>
</html>
